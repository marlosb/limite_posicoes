<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculos de limites</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <main class="container">
    <h1>Calculos de limites</h1>

    <label for="pipelineSelect" class="label">Escolha a ativo</label>
    <select id="pipelineSelect" class="select">
      <option value="">Loading pipelines...</option>
    </select>

    <section class="section">
      <h2>Etapas de cáculo</h2>
      <div id="status" class="status">Select a pipeline to load steps.</div>
      <div id="stepsTableContainer" class="table-wrap"></div>
      <div class="actions actions-bottom">
        <button id="runButton" class="btn" type="button">Run</button>
        <button id="editButton" class="btn" type="button">Editar</button>
        <button id="saveAllButton" class="btn" type="button" style="display: none;">Salvar</button>
      </div>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
